<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>APEX SHOP — мини-приложение</title>
  <style>
    :root {
      --bg: #0E0E10;
      --card: #1A1A1D;
      --surface: #232327;
      --accent-orange: #FF8C00;
      --accent-blue: #3B82F6;
      --text: #ffffff;
      --muted: #9ca3af;
      --radius-card: 20px;
      --radius-pill: 999px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at 10% -20%, #1a1a20 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 110px;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }
    .title h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.6px;
    }
    .title p { margin: 4px 0 0; color: var(--muted); }

    .icon-btn {
      border: 1px solid #2f3037;
      background: #191a1f;
      color: var(--accent-blue);
      border-radius: 14px;
      min-width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease;
    }
    .icon-btn:active { transform: scale(0.96); }

    .section { display: none; animation: fade .25s ease; }
    .section.active { display: block; }
    @keyframes fade { from {opacity: .4; transform: translateY(6px);} to {opacity: 1; transform: translateY(0);} }

    .search-row {
      display: grid;
      gap: 10px;
      margin: 10px 0 16px;
    }
    .search, .filter-select, .promo-input {
      background: var(--card);
      border: 1px solid #2a2b30;
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
      width: 100%;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .product {
      background: linear-gradient(180deg, #23242a, var(--card));
      border-radius: var(--radius-card);
      padding: 10px;
      box-shadow: var(--shadow);
      border: 1px solid #2b2c31;
      position: relative;
      overflow: hidden;
    }

    .badge-row {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .badge {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      color: #fff;
      backdrop-filter: blur(4px);
    }
    .badge.stock { background: rgba(255, 140, 0, .95); }
    .badge.new { background: rgba(59, 130, 246, .95); }

    .product img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 10px;
      background: #2a2b30;
    }

    .p-name { margin: 0; font-size: 18px; min-height: 46px; }
    .meta { color: var(--muted); font-size: 14px; margin: 6px 0 8px; }
    .rating { color: #fbbf24; }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .actions { display: flex; gap: 8px; }
    .act {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid #34353d;
      background: #1f2026;
      color: #fff;
      cursor: pointer;
      transition: .2s ease;
    }
    .act.active { background: var(--accent-blue); border-color: transparent; }
    .act.fav.active { color: #ff5d5d; background: #2b1d22; }
    .price { font-size: 28px; font-weight: 700; white-space: nowrap; }

    .cats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .cat-btn {
      border-radius: 18px;
      border: 1px solid #30313a;
      background: var(--card);
      color: var(--text);
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }
    .cat-btn.active { background: linear-gradient(135deg, #1f2e45, #20222a); border-color: #3a4b68; color: var(--accent-blue); }

    .cart-list { display: grid; gap: 10px; margin-bottom: 16px; }
    .cart-item {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      padding: 10px;
      background: var(--card);
      border: 1px solid #2e2f36;
      border-radius: 16px;
      align-items: center;
    }
    .cart-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
    .qty-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .qty-row button, .danger {
      border: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #2b2c31;
      color: #fff;
      cursor: pointer;
    }
    .danger { color: #ff6b6b; }
    .totals {
      background: var(--card);
      border: 1px solid #2f3038;
      border-radius: 20px;
      padding: 14px;
    }
    .line { display: flex; justify-content: space-between; margin: 6px 0; color: var(--muted); }
    .line.total { color: #fff; font-size: 22px; font-weight: 700; }

    .checkout {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-blue), #5ea0ff);
      color: #fff;
      font-size: 20px;
      padding: 14px;
      cursor: pointer;
    }

    .profile-card {
      background: var(--card);
      border: 1px solid #30323a;
      border-radius: 20px;
      padding: 16px;
    }
    .orders { margin-top: 12px; display: grid; gap: 8px; }
    .order-item { background: #24252b; border-radius: 14px; padding: 10px; color: #d1d5db; }
    .support { margin-top: 14px; display: block; text-align: center; text-decoration: none; color: #fff; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(460px, calc(100% - 20px));
      background: rgba(32, 33, 39, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #32333c;
      border-radius: 24px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      box-shadow: 0 16px 35px rgba(0,0,0,.45);
      z-index: 50;
    }
    .nav-btn {
      border: 0;
      background: transparent;
      color: #d1d5db;
      border-radius: 18px;
      padding: 8px 4px;
      font-size: 13px;
      cursor: pointer;
      position: relative;
    }
    .nav-btn.active {
      color: var(--accent-blue);
      background: radial-gradient(circle at top, #2a3c5d 0%, #2a2b31 65%);
    }
    .cart-count {
      position: absolute;
      top: 2px; right: 16px;
      background: var(--accent-blue);
      color: #fff;
      border-radius: 999px;
      min-width: 18px;
      padding: 1px 5px;
      font-size: 11px;
    }

    .skeleton-wrap { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .skeleton {
      height: 240px;
      border-radius: 20px;
      background: linear-gradient(90deg, #22232a 25%, #2b2c33 37%, #22232a 63%);
      background-size: 400% 100%;
      animation: sk 1.2s ease infinite;
    }
    @keyframes sk { from { background-position: 100% 0; } to { background-position: 0 0; } }

    .toast {
      position: fixed;
      left: 50%; transform: translateX(-50%);
      bottom: 88px;
      background: #1f2430;
      border: 1px solid #3c4f71;
      padding: 10px 14px;
      border-radius: 14px;
      opacity: 0;
      pointer-events: none;
      transition: .25s;
      z-index: 60;
    }
    .toast.show { opacity: 1; }
    .subtle { color: var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>APEX SHOP</h1>
        <p>мини-приложение</p>
      </div>
      <button class="icon-btn" title="Telegram API">◌</button>
    </header>

    <section id="home" class="section active">
      <div class="search-row">
        <input class="search" id="searchInput" type="search" placeholder="Поиск товаров..." />
        <select class="filter-select" id="filterSelect">
          <option value="all">Все категории</option>
          <option value="PUBG MOBILE">PUBG MOBILE</option>
          <option value="Telegram">Telegram</option>
          <option value="Игры">Игры</option>
          <option value="Подписки">Подписки</option>
        </select>
      </div>
      <div id="homeSkeleton" class="skeleton-wrap">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
      <div id="homeGrid" class="grid"></div>
    </section>

    <section id="catalog" class="section">
      <div class="cats" id="catButtons"></div>
      <div id="catalogGrid" class="grid"></div>
    </section>

    <section id="cart" class="section">
      <h2 style="margin:0 0 10px;font-size:42px">Корзина</h2>
      <div class="cart-list" id="cartList"></div>
      <input class="promo-input" id="promoInput" placeholder="Активировать промокод" />
      <button class="icon-btn" id="promoApply" style="margin-top:8px;width:100%">Применить</button>
      <div class="totals">
        <div class="line"><span>Товары</span><strong id="subTotal">0 ₽</strong></div>
        <div class="line"><span>Скидка</span><strong id="discount">0 ₽</strong></div>
        <div class="line total"><span>Итого</span><strong id="grandTotal">0 ₽</strong></div>
        <button class="checkout">Оформить заказ</button>
      </div>
    </section>

    <section id="profile" class="section">
      <div class="profile-card">
        <h2 style="margin-top:0">Профиль</h2>
        <p><strong>ID пользователя:</strong> <span id="userId"></span></p>
        <p><strong>Баланс:</strong> <span id="balance">—</span></p>
        <h3>История заказов</h3>
        <div class="orders" id="orders"></div>
        <a class="checkout support" href="https://t.me" target="_blank">Связь с поддержкой</a>
      </div>
      <p class="subtle">Интеграция Telegram API и push-уведомлений: предусмотрены хуки в коде (см. initTelegramIntegration / initPush).</p>
    </section>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="home">🏠<br>Главная</button>
    <button class="nav-btn" data-tab="catalog">◻️<br>Каталог</button>
    <button class="nav-btn" data-tab="cart">🛒<span class="cart-count" id="cartCount">0</span><br>Корзина</button>
    <button class="nav-btn" data-tab="profile">👤<br>Профиль</button>
  </nav>

  <div id="toast" class="toast"></div>

  <script>
    const categories = ["PUBG MOBILE", "Telegram", "Игры", "Подписки"];
    const products = [
      {id:1, name:"Telegram Premium 1 месяц", price:199, category:"Telegram", badge:"В наличии", img:"https://images.unsplash.com/photo-1611606063065-ee7946f0787a?q=80&w=800&auto=format&fit=crop", rating:4.9, reviews:128},
      {id:2, name:"Telegram Premium 3 месяца", price:499, category:"Telegram", badge:"Новинка", img:"https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800&auto=format&fit=crop", rating:5, reviews:76},
      {id:3, name:"Telegram Stars 100", price:149, category:"Telegram", badge:"В наличии", img:"https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=800&auto=format&fit=crop", rating:4.8, reviews:44},
      {id:4, name:"Telegram Stars 500", price:599, category:"Telegram", badge:"В наличии", img:"https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=800&auto=format&fit=crop", rating:4.7, reviews:23},
      {id:5, name:"Подписчики Telegram 100", price:99, category:"Telegram", badge:"В наличии", img:"https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=800&auto=format&fit=crop"},
      {id:6, name:"Подписчики Telegram 1000", price:799, category:"Telegram", badge:"В наличии", img:"https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=800&auto=format&fit=crop", rating:4.6, reviews:15},
      {id:7, name:"Просмотры постов 1000", price:49, category:"Telegram", badge:"Новинка", img:"https://images.unsplash.com/photo-1516321497487-e288fb19713f?q=80&w=800&auto=format&fit=crop"},
      {id:8, name:"UC 325", price:380, category:"PUBG MOBILE", badge:"В наличии", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800&auto=format&fit=crop", rating:5, reviews:52},
      {id:9, name:"UC 660", price:760, category:"PUBG MOBILE", badge:"В наличии", img:"https://images.unsplash.com/photo-1548686304-89d188a80029?q=80&w=800&auto=format&fit=crop", rating:4.9, reviews:31},
      {id:10, name:"Игровой набор APEX", price:1190, category:"Игры", badge:"Новинка", img:"https://images.unsplash.com/photo-1603481546238-487240415921?q=80&w=800&auto=format&fit=crop"},
      {id:11, name:"YouTube Premium 1 месяц", price:299, category:"Подписки", badge:"В наличии", img:"https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?q=80&w=800&auto=format&fit=crop", rating:4.7, reviews:21}
    ];

    const state = {
      tab: 'home',
      category: 'Telegram',
      query: '',
      filter: 'all',
      cart: {},
      favs: new Set(),
      promo: null,
      user: {
        id: Math.floor(100000 + Math.random() * 900000),
        balance: 0,
        orders: [{id: "#1021", status: "Доставлен", amount: 499}, {id:"#1002", status:"Доставлен", amount:149}]
      }
    };

    const promos = { APEX10: 0.1, TG20: 0.2 };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const fmt = (n) => `${n.toLocaleString('ru-RU')} ₽`;

    function toast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    function productCard(p) {
      const isFav = state.favs.has(p.id);
      return `
        <article class="product">
          <div class="badge-row">
            <span class="badge stock">${p.badge === 'Новинка' ? 'В наличии' : p.badge}</span>
            ${p.badge === 'Новинка' ? '<span class="badge new">Новинка</span>' : ''}
          </div>
          <img src="${p.img}" alt="${p.name}" loading="lazy" />
          <h3 class="p-name">${p.name}</h3>
          <div class="meta">${p.rating ? `<span class="rating">★ ${p.rating}</span> · ${p.reviews ?? 0} отзывов` : 'нет отзывов'}</div>
          <div class="card-bottom">
            <div class="actions">
              <button class="act add" data-id="${p.id}">🛒</button>
              <button class="act fav ${isFav ? 'active' : ''}" data-fid="${p.id}">♡</button>
            </div>
            <strong class="price">${fmt(p.price)}</strong>
          </div>
        </article>
      `;
    }

    function filteredProducts() {
      return products.filter(p => {
        const q = state.query.trim().toLowerCase();
        const byQuery = !q || p.name.toLowerCase().includes(q);
        const byFilter = state.filter === 'all' || p.category === state.filter;
        return byQuery && byFilter;
      });
    }

    function renderHome() {
      $('#homeGrid').innerHTML = filteredProducts().map(productCard).join('') || '<p class="subtle">Ничего не найдено.</p>';
      bindCardEvents();
    }

    function renderCatalog() {
      $('#catButtons').innerHTML = categories.map(c => `<button class="cat-btn ${state.category === c ? 'active' : ''}" data-cat="${c}">${c}</button>`).join('');
      $('#catalogGrid').innerHTML = products.filter(p => p.category === state.category).map(productCard).join('') || '<p class="subtle">Товаров пока нет.</p>';
      $$('.cat-btn').forEach(b => b.onclick = () => { state.category = b.dataset.cat; renderCatalog(); });
      bindCardEvents();
    }

    function renderCart() {
      const entries = Object.entries(state.cart);
      const items = entries.map(([id, qty]) => {
        const p = products.find(x => x.id === Number(id));
        return `
          <div class="cart-item">
            <img src="${p.img}" alt="${p.name}" />
            <div>
              <div style="font-size:20px;color:var(--accent-blue)">${p.name}</div>
              <div class="subtle">Цена/шт ${fmt(p.price)}</div>
              <div class="qty-row">
                <button onclick="changeQty(${p.id},-1)">−</button>
                <strong>${qty} шт</strong>
                <button onclick="changeQty(${p.id},1)">+</button>
                <button class="danger" onclick="removeFromCart(${p.id})">🗑</button>
              </div>
            </div>
          </div>`;
      }).join('');
      $('#cartList').innerHTML = items || '<p class="subtle">Корзина пуста.</p>';

      const subtotal = entries.reduce((s, [id, qty]) => s + products.find(p => p.id === Number(id)).price * qty, 0);
      const discount = state.promo ? Math.round(subtotal * state.promo) : 0;
      const total = Math.max(0, subtotal - discount);
      $('#subTotal').textContent = fmt(subtotal);
      $('#discount').textContent = `- ${fmt(discount)}`;
      $('#grandTotal').textContent = fmt(total);
      $('#cartCount').textContent = entries.reduce((s, [, qty]) => s + qty, 0);
    }

    function renderProfile() {
      $('#userId').textContent = state.user.id;
      $('#balance').textContent = state.user.balance ? fmt(state.user.balance) : 'Нет данных';
      $('#orders').innerHTML = state.user.orders.map(o => `<div class="order-item">Заказ ${o.id} · ${o.status} · ${fmt(o.amount)}</div>`).join('');
    }

    function bindCardEvents() {
      $$('.add').forEach(b => b.onclick = () => {
        const id = Number(b.dataset.id);
        state.cart[id] = (state.cart[id] || 0) + 1;
        b.classList.add('active');
        setTimeout(() => b.classList.remove('active'), 280);
        toast('Товар добавлен в корзину');
        renderCart();
      });
      $$('.fav').forEach(b => b.onclick = () => {
        const id = Number(b.dataset.fid);
        if (state.favs.has(id)) state.favs.delete(id); else state.favs.add(id);
        b.classList.toggle('active');
      });
    }

    window.changeQty = (id, delta) => {
      if (!state.cart[id]) return;
      state.cart[id] += delta;
      if (state.cart[id] <= 0) delete state.cart[id];
      renderCart();
    };

    window.removeFromCart = (id) => {
      delete state.cart[id];
      renderCart();
      toast('Товар удалён');
    };

    function switchTab(tab) {
      state.tab = tab;
      $$('.section').forEach(s => s.classList.remove('active'));
      $(`#${tab}`).classList.add('active');
      $$('.nav-btn').forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
    }

    function initTelegramIntegration() {
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }
    }

    async function initPush() {
      if (!('Notification' in window)) return;
      // Заглушка под подключение push-сервиса
      // можно подключить Firebase/OneSignal и регистрацию service worker
    }

    // init
    setTimeout(() => {
      $('#homeSkeleton').style.display = 'none';
      renderHome();
      renderCatalog();
      renderCart();
      renderProfile();
    }, 550);

    $('#searchInput').oninput = (e) => { state.query = e.target.value; renderHome(); };
    $('#filterSelect').onchange = (e) => { state.filter = e.target.value; renderHome(); };
    $('#promoApply').onclick = () => {
      const code = $('#promoInput').value.trim().toUpperCase();
      if (promos[code]) { state.promo = promos[code]; toast('Промокод активирован'); }
      else { state.promo = null; toast('Промокод не найден'); }
      renderCart();
    };
    $$('.nav-btn').forEach(btn => btn.onclick = () => switchTab(btn.dataset.tab));

    initTelegramIntegration();
    initPush();
  </script>
</body>
</html>
